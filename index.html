<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetter App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-top">
                <h1>Wetter App</h1>
                <div class="header-buttons">
                    <button id="geoBtn" class="icon-btn" title="Mein Standort">📍</button>
                    <button id="themeBtn" class="icon-btn" title="Dark Mode">🌙</button>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="cityInput" placeholder="Stadt eingeben..." autofocus>
                <button id="searchBtn">Suchen</button>
                <div id="suggestions" class="suggestions hidden"></div>
            </div>
            <div class="controls-row">
                <div class="units-toggle">
                    <button id="unitC" class="unit-btn active">°C</button>
                    <button id="unitF" class="unit-btn">°F</button>
                </div>
                <button id="favBtn" class="fav-btn" title="Zu Favoriten hinzufügen">☆</button>
            </div>
            <div id="favoritesContainer" class="favorites-container hidden">
                <span class="fav-label">Favoriten:</span>
                <div id="favoritesList" class="favorites-list"></div>
            </div>
        </header>

        <div id="errorDisplay" class="error hidden"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Wetterdaten werden geladen...</span>
        </div>

        <main id="mainContent">
            <div class="welcome">
                <div class="weather-icon-large">
                    <div class="anim-icon sunny">
                        <div class="sun"></div>
                    </div>
                </div>
                <h2>Willkommen!</h2>
                <p>Gib eine Stadt ein, um das aktuelle Wetter zu sehen.</p>
                <p class="hint">z.B. Berlin, München, Hamburg, London...</p>
                <p class="hint"> oder tippe auf 📍 für deinen Standort</p>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
